<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>見積一覧 — リフォーム見積もり管理</title>
<style>
  :root{
    --ink:#1c2530; --ink-soft:#54606e; --ink-faint:#8a93a0;
    --line:#e4e7ec; --line-soft:#eef0f3;
    --surface:#ffffff; --bg:#eef0f3;
    --primary:#2d4a73; --primary-d:#233a5c; --primary-tint:#e9f0f9;
    --amber:#9a6b12; --amber-tint:#fbf1dc;
    --blue:#1f5e92; --blue-tint:#e4eff8;
    --violet:#5a45a0; --violet-tint:#ece7fa;
    --green:#256b46; --green-tint:#e1f1e8;
    --red:#a63f37; --red-tint:#fae5e2;
    --gray:#5d6772; --gray-tint:#eceef1;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic","Noto Sans JP",-apple-system,system-ui,sans-serif;
    --radius:10px; --shadow:0 1px 2px rgba(28,37,48,.06),0 4px 16px rgba(28,37,48,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.55;
    font-feature-settings:"palt";-webkit-font-smoothing:antialiased}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 64px}

  .topbar{background:var(--surface);border-bottom:1px solid var(--line)}
  .topbar-in{max-width:1180px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:14px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.02em;font-size:14px}
  .logo .mark{width:22px;height:22px;border-radius:5px;background:var(--primary);position:relative;flex:none}
  .logo .mark::before{content:"";position:absolute;inset:5px 5px auto 5px;height:3px;background:#fff;border-radius:2px;box-shadow:0 5px 0 #fff,0 10px 0 rgba(255,255,255,.55)}
  .crumb{margin-left:auto;font-size:12.5px;color:var(--ink-faint)}
  .crumb b{color:var(--ink-soft);font-weight:600}

  .page-h{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;padding:24px 0 18px}
  .page-h h1{font-size:21px;font-weight:700;letter-spacing:.01em}
  .page-h .asof{font-size:12px;color:var(--ink-faint)}
  .page-h .spacer{flex:1}
  .btn{font-family:var(--sans);font-size:13px;font-weight:600;border-radius:8px;padding:8px 15px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:.12s}
  .btn:hover{border-color:#c9cfd8;background:#fafbfc}
  .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
  .btn-primary:hover{background:var(--primary-d)}
  .btn-primary .plus{font-weight:700;margin-right:5px}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
  .stat .lab{font-size:11.5px;color:var(--ink-faint);font-weight:600;letter-spacing:.04em}
  .stat .big{font-family:var(--mono);font-size:25px;font-weight:600;margin-top:4px;font-variant-numeric:tabular-nums;line-height:1.1}
  .stat .unit{font-size:13px;color:var(--ink-soft);font-family:var(--sans)}
  .stat .sub{font-size:11.5px;color:var(--ink-faint);margin-top:3px}
  .stat.alert .big{color:var(--red)}
  .stat.win .big{color:var(--green)}

  /* filter bar */
  .filters{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:16px}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px}
  .chip{flex:none;font-family:var(--sans);font-size:12.5px;font-weight:600;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);border-radius:999px;padding:6px 13px;cursor:pointer;transition:.12s;white-space:nowrap}
  .chip:hover{border-color:#c9cfd8}
  .chip .ct{margin-left:6px;font-family:var(--mono);font-size:11px;color:var(--ink-faint)}
  .chip.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .chip.on .ct{color:rgba(255,255,255,.75)}
  .frow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:13px}
  .search{position:relative;flex:1;min-width:200px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-faint)}
  .search input{width:100%;font-family:var(--sans);font-size:13.5px;border:1px solid var(--line);border-radius:8px;padding:9px 12px 9px 34px;background:#fcfcfd}
  .search input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint);background:#fff}
  select.pick{font-family:var(--sans);font-size:13px;font-weight:500;border:1px solid var(--line);border-radius:8px;padding:9px 30px 9px 12px;background:var(--surface);color:var(--ink);cursor:pointer;appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M1 1l4 4 4-4' stroke='%238a93a0' stroke-width='1.5' fill='none' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 11px center}

  /* table */
  .tablecard{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .tscroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;min-width:740px}
  thead th{font-size:11px;font-weight:700;letter-spacing:.05em;color:var(--ink-faint);text-align:left;padding:12px 14px;border-bottom:1px solid var(--line);background:#fafbfc;white-space:nowrap}
  thead th.sortable{cursor:pointer;user-select:none}
  thead th.sortable:hover{color:var(--ink-soft)}
  thead th .arr{font-size:9px;margin-left:3px;color:var(--primary)}
  th.r,td.r{text-align:right}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line-soft);font-size:13.5px;vertical-align:middle}
  tbody tr{cursor:pointer;transition:.1s}
  tbody tr:hover{background:var(--primary-tint)}
  tbody tr:last-child td{border-bottom:none}
  .c-no{font-family:var(--mono);font-size:12.5px;color:var(--primary-d);font-weight:600;white-space:nowrap}
  .c-prop b{font-weight:600;display:block;line-height:1.35}
  .c-prop small{color:var(--ink-faint);font-size:11.5px}
  .c-amt{font-family:var(--mono);font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  .c-amt small{display:block;font-family:var(--sans);font-size:10.5px;color:var(--ink-faint);font-weight:500}
  .c-amt.none{color:var(--ink-faint);font-weight:500}
  .c-date{font-family:var(--mono);font-size:12px;color:var(--ink-soft);white-space:nowrap}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:999px;white-space:nowrap}
  .badge::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}
  .b-amber{color:var(--amber);background:var(--amber-tint)}
  .b-blue{color:var(--blue);background:var(--blue-tint)}
  .b-violet{color:var(--violet);background:var(--violet-tint)}
  .b-green{color:var(--green);background:var(--green-tint)}
  .b-red{color:var(--red);background:var(--red-tint)}
  .b-gray{color:var(--gray);background:var(--gray-tint)}

  .u{font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:6px;white-space:nowrap}
  .u-over{color:var(--red);background:var(--red-tint)}
  .u-soon{color:var(--amber);background:var(--amber-tint)}
  .u-ok{color:var(--ink-soft);background:transparent;font-weight:600}
  .u-mute{color:var(--ink-faint);background:transparent;font-weight:500}

  .empty{padding:48px 20px;text-align:center;color:var(--ink-faint);font-size:13.5px}
  .resultline{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;font-size:12px;color:var(--ink-faint);border-top:1px solid var(--line-soft)}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <div class="logo"><span class="mark"></span>リフォーム見積もり管理</div>
<style>
.demo-nav{display:flex;gap:2px;margin-left:8px;flex-wrap:wrap}
.demo-nav a{font-size:12.5px;font-weight:600;color:#54606e;text-decoration:none;padding:6px 10px;border-radius:7px;white-space:nowrap}
.demo-nav a:hover{background:#eef0f3;color:#1c2530}
.demo-nav a.active{background:#e9f0f9;color:#233a5c}
.demo-tag{margin-left:8px;font-size:10.5px;font-weight:700;letter-spacing:.04em;color:#9a6b12;background:#fbf1dc;padding:2px 8px;border-radius:5px}
@media(max-width:760px){.demo-nav{display:none}}
</style>
<nav class="demo-nav">
<a href="index.html">概要</a>
<a href="list.html">一覧</a>
<a href="new.html">新規</a>
<a href="detail.html">詳細</a>
<a href="import.html">取込</a>
<a href="diff.html">差分</a>
<a href="users.html">設定</a>
<span class="demo-tag">サンプル</span>
</nav>
<script>(function(){var f=location.pathname.split('/').pop()||'index.html';document.querySelectorAll('.demo-nav a').forEach(function(a){if(a.getAttribute('href')===f)a.classList.add('active');});})();</script>
    <div class="crumb"><b>見積一覧</b></div>
  </div>
</div>

<div class="wrap">
  <div class="page-h">
    <h1>見積一覧</h1>
    <span class="asof">基準日 2026/06/13</span>
    <span class="spacer"></span>
    <button class="btn btn-primary"><span class="plus">＋</span>新規依頼</button>
  </div>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <div class="chips" id="chips"></div>
    <div class="frow">
      <div class="search">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="q" type="text" placeholder="見積番号・物件名・依頼者で検索">
      </div>
      <select class="pick" id="staff" aria-label="担当者">
        <option value="">担当：すべて</option>
        <option>山本</option><option>佐藤</option><option>鈴木</option><option>高橋</option>
      </select>
    </div>
  </div>

  <div class="tablecard">
    <div class="tscroll">
      <table>
        <thead>
          <tr>
            <th class="sortable" data-sort="no">見積番号<span class="arr" data-arr="no"></span></th>
            <th>物件・依頼者</th>
            <th>担当</th>
            <th>状態</th>
            <th class="r sortable" data-sort="amt">最新版額<span class="arr" data-arr="amt"></span></th>
            <th>対応期限</th>
            <th class="sortable" data-sort="updated">更新日<span class="arr" data-arr="updated"></span></th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <div class="resultline"><span id="count"></span><span>行をクリックで詳細へ</span></div>
  </div>
</div>

<script>
  const yen = n => "¥" + Number(n).toLocaleString("ja-JP");
  const TODAY = new Date("2026-06-13T00:00:00");
  const parse = s => new Date(s + "T00:00:00");
  const days = (a,b) => Math.floor((a - b)/86400000);
  const disp = s => s ? s.slice(5).replace("-","/") : "—";

  const STATUS = ["受付","見積中","提出済","交渉中","受注","失注","保留"];
  const badgeCls = {"受付":"b-gray","見積中":"b-amber","提出済":"b-blue","交渉中":"b-violet","受注":"b-green","失注":"b-red","保留":"b-gray"};
  const targetDays = {"通常":7,"最短":3,"急がない":14};

  const data = [
    {no:"R2026-0042", prop:"グランドメゾン岡山表町 401", client:"田中 様", staff:"山本", status:"交渉中", amt:1265000, vers:3, applied:"2026-05-16", lastSent:"2026-06-05", deadline:"通常", updated:"2026-06-05", link:"detail.html"},
    {no:"R2026-0050", prop:"メゾン・ド・清輝橋 503", client:"中村 様", staff:"高橋", status:"受付", amt:null, vers:0, applied:"2026-06-05", lastSent:null, deadline:"通常", updated:"2026-06-05"},
    {no:"R2026-0049", prop:"コーポ妹尾 A棟103", client:"加藤 様", staff:"山本", status:"見積中", amt:null, vers:0, applied:"2026-06-11", lastSent:null, deadline:"最短", updated:"2026-06-12"},
    {no:"R2026-0048", prop:"サンハイツ倉敷 305", client:"佐々木 様", staff:"佐藤", status:"見積中", amt:null, vers:0, applied:"2026-06-09", lastSent:null, deadline:"通常", updated:"2026-06-10"},
    {no:"R2026-0047", prop:"ヴェルデ西大寺 204", client:"小林 様", staff:"佐藤", status:"交渉中", amt:980000, vers:2, applied:"2026-05-12", lastSent:"2026-05-30", deadline:"通常", updated:"2026-05-30"},
    {no:"R2026-0046", prop:"ウェルカーサ庭瀬 208", client:"清水 様", staff:"山本", status:"保留", amt:1120000, vers:1, applied:"2026-05-25", lastSent:"2026-05-27", deadline:"急がない", updated:"2026-05-31"},
    {no:"R2026-0045", prop:"リバーサイド岡南 102", client:"株式会社オカヤ", staff:"鈴木", status:"提出済", amt:2140000, vers:1, applied:"2026-06-01", lastSent:"2026-06-08", deadline:"最短", updated:"2026-06-08"},
    {no:"R2026-0044", prop:"グレイス岡山中山下 702", client:"渡辺 様", staff:"高橋", status:"提出済", amt:1560000, vers:1, applied:"2026-05-28", lastSent:"2026-06-03", deadline:"通常", updated:"2026-06-03"},
    {no:"R2026-0041", prop:"ロイヤルガーデン東岡山 305", client:"伊藤 様", staff:"鈴木", status:"受注", amt:2260000, vers:2, applied:"2026-05-08", lastSent:"2026-05-22", deadline:"通常", updated:"2026-06-02"},
    {no:"R2026-0039", prop:"パークコート津山 201", client:"山田 様", staff:"山本", status:"受注", amt:1780000, vers:2, applied:"2026-04-30", lastSent:"2026-05-14", deadline:"通常", updated:"2026-05-26"},
    {no:"R2026-0036", prop:"アーバン岡山駅前 1204", client:"株式会社サンライズ", staff:"鈴木", status:"失注", amt:3420000, vers:3, applied:"2026-04-18", lastSent:"2026-05-10", deadline:"通常", updated:"2026-05-20"},
    {no:"R2026-0051", prop:"シャトー高屋 401", client:"松本 様", staff:"佐藤", status:"受付", amt:null, vers:0, applied:"2026-06-12", lastSent:null, deadline:"急がない", updated:"2026-06-12"},
  ];

  function urgency(r){
    if(r.status==="受注"||r.status==="失注") return {txt:"完了", cls:"u-mute"};
    if(r.status==="保留") return {txt:"保留中", cls:"u-mute"};
    if(r.vers===0 || r.status==="受付" || r.status==="見積中"){
      const t = targetDays[r.deadline] ?? 7;
      const remain = t - days(TODAY, parse(r.applied));
      if(remain < 0) return {txt:`期限超過 ${-remain}日`, cls:"u-over"};
      if(remain <= 2) return {txt:`残り${remain}日`, cls:"u-soon"};
      return {txt:`残り${remain}日`, cls:"u-ok"};
    }
    if(r.lastSent){
      const since = days(TODAY, parse(r.lastSent));
      if(since >= 10) return {txt:`停滞 ${since}日`, cls:"u-soon"};
      return {txt:`送信 ${since}日前`, cls:"u-ok"};
    }
    return {txt:"—", cls:"u-mute"};
  }

  const state = {status:"すべて", staff:"", q:"", sortKey:"updated", sortDir:"desc"};

  function filtered(){
    return data.filter(r=>{
      if(state.status!=="すべて" && r.status!==state.status) return false;
      if(state.staff && r.staff!==state.staff) return false;
      if(state.q){
        const q = state.q.toLowerCase();
        if(!(r.no.toLowerCase().includes(q) || r.prop.toLowerCase().includes(q) || r.client.toLowerCase().includes(q))) return false;
      }
      return true;
    });
  }

  function sortRows(rows){
    const dir = state.sortDir==="asc" ? 1 : -1;
    return [...rows].sort((a,b)=>{
      let av,bv;
      if(state.sortKey==="amt"){ av=a.amt??-1; bv=b.amt??-1; }
      else if(state.sortKey==="no"){ av=a.no; bv=b.no; }
      else { av=a.updated; bv=b.updated; }
      if(av<bv) return -1*dir; if(av>bv) return 1*dir; return 0;
    });
  }

  function renderChips(){
    const counts = {}; STATUS.forEach(s=>counts[s]=0);
    data.forEach(r=>counts[r.status]++);
    const items = [["すべて", data.length], ...STATUS.map(s=>[s, counts[s]])];
    document.getElementById("chips").innerHTML = items.map(([s,c])=>
      `<button class="chip ${state.status===s?'on':''}" data-st="${s}">${s}<span class="ct">${c}</span></button>`
    ).join("");
    document.querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ state.status=c.dataset.st; render(); });
  }

  function renderStats(){
    const active = data.filter(r=>!["受注","失注"].includes(r.status));
    const need = data.filter(r=>{ const u=urgency(r).cls; return u==="u-over"||u==="u-soon"; });
    const won = data.filter(r=>r.status==="受注");
    const wonSum = won.reduce((s,r)=>s+(r.amt||0),0);
    document.getElementById("stats").innerHTML = `
      <div class="stat"><div class="lab">全案件</div><div class="big">${data.length}<span class="unit"> 件</span></div><div class="sub">進行中 ${active.length}件</div></div>
      <div class="stat"><div class="lab">進行中</div><div class="big">${active.length}<span class="unit"> 件</span></div><div class="sub">受付〜交渉中・保留</div></div>
      <div class="stat alert"><div class="lab">要対応（期限超過・停滞）</div><div class="big">${need.length}<span class="unit"> 件</span></div><div class="sub">期限切れ間近を含む</div></div>
      <div class="stat win"><div class="lab">受注（今月）</div><div class="big">${won.length}<span class="unit"> 件</span></div><div class="sub">${yen(wonSum)}</div></div>`;
  }

  function render(){
    renderChips();
    renderStats();
    document.querySelectorAll("[data-arr]").forEach(a=>a.textContent="");
    const arr = document.querySelector(`[data-arr="${state.sortKey}"]`);
    if(arr) arr.textContent = state.sortDir==="asc" ? "▲" : "▼";

    const rows = sortRows(filtered());
    const tb = document.getElementById("rows");
    if(rows.length===0){
      tb.innerHTML = `<tr><td colspan="7"><div class="empty">条件に合う見積依頼がありません。フィルタを変更してください。</div></td></tr>`;
    } else {
      tb.innerHTML = rows.map(r=>{
        const u = urgency(r);
        const amtCell = r.amt!=null
          ? `<td class="r"><span class="c-amt">${yen(r.amt)}<small>第${r.vers}版</small></span></td>`
          : `<td class="r"><span class="c-amt none">—<small>未作成</small></span></td>`;
        return `<tr data-link="${r.link||''}">
          <td><span class="c-no">${r.no}</span></td>
          <td class="c-prop"><b>${r.prop}</b><small>${r.client}</small></td>
          <td>${r.staff}</td>
          <td><span class="badge ${badgeCls[r.status]}">${r.status}</span></td>
          ${amtCell}
          <td><span class="u ${u.cls}">${u.txt}</span></td>
          <td><span class="c-date">${disp(r.updated)}</span></td>
        </tr>`;
      }).join("");
      tb.querySelectorAll("tr").forEach(tr=>{
        tr.onclick=()=>{ location.href='detail.html'; };
      });
    }
    document.getElementById("count").textContent = `${rows.length} 件を表示（全 ${data.length} 件）`;
  }

  document.getElementById("q").addEventListener("input", e=>{ state.q=e.target.value; render(); });
  document.getElementById("staff").addEventListener("change", e=>{ state.staff=e.target.value; render(); });
  document.querySelectorAll("th.sortable").forEach(th=>{
    th.onclick=()=>{
      const k=th.dataset.sort;
      if(state.sortKey===k) state.sortDir = state.sortDir==="asc"?"desc":"asc";
      else { state.sortKey=k; state.sortDir = k==="amt"?"desc":"desc"; }
      render();
    };
  });

  render();
</script>
</body>
</html>
